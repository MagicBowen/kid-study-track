<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utils.js Test</title>
  <style>
    body {
      font-family: 'Microsoft YaHei', sans-serif;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    .test-section {
      margin-bottom: 30px;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    .test-section h3 {
      margin-top: 0;
      color: #333;
    }
    .test-result {
      background: #f5f5f5;
      padding: 10px;
      border-radius: 4px;
      margin-top: 10px;
      font-family: monospace;
    }
    .pass { color: #27ae60; }
    .fail { color: #e74c3c; }
    button {
      padding: 8px 16px;
      margin-right: 10px;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      background: #3498db;
      color: white;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <h1>Utils.js 测试页面</h1>

  <div class="test-section">
    <h3>DateUtils 测试</h3>
    <button onclick="testDateUtils()">运行测试</button>
    <div id="dateResults" class="test-result"></div>
  </div>

  <div class="test-section">
    <h3>TimeUtils 测试</h3>
    <button onclick="testTimeUtils()">运行测试</button>
    <div id="timeResults" class="test-result"></div>
  </div>

  <div class="test-section">
    <h3>SubjectConfig 测试</h3>
    <button onclick="testSubjectConfig()">运行测试</button>
    <div id="subjectResults" class="test-result"></div>
  </div>

  <div class="test-section">
    <h3>showToast 测试</h3>
    <button onclick="showToast('这是一条成功消息', 'success')">成功</button>
    <button onclick="showToast('这是一条错误消息', 'error')">错误</button>
    <button onclick="showToast('这是一条普通消息', 'info')">普通</button>
  </div>

  <script src="src/public/js/utils.js"></script>
  <script>
    function testDateUtils() {
      const results = [];
      let passCount = 0;
      let failCount = 0;

      // Test getWeekStart
      const today = new Date();
      const weekStart = DateUtils.getWeekStart(today);
      const weekStartDate = new Date(weekStart);
      const isMonday = weekStartDate.getDay() === 1;
      results.push(`getWeekStart: ${weekStart} (是周一: ${isMonday}) ${isMonday ? '<span class="pass">✓</span>' : '<span class="fail">✗</span>'}`);
      if (isMonday) passCount++; else failCount++;

      // Test format
      const testDate = new Date(2026, 2, 23); // March 23, 2026
      const formatted = DateUtils.format(testDate);
      const expected = '2026-03-23';
      results.push(`format: ${formatted} (期望: ${expected}) ${formatted === expected ? '<span class="pass">✓</span>' : '<span class="fail">✗</span>'}`);
      if (formatted === expected) passCount++; else failCount++;

      // Test getWeekDates
      const weekDates = DateUtils.getWeekDates(weekStart);
      const has7Dates = weekDates.length === 7;
      results.push(`getWeekDates: 返回 ${weekDates.length} 个日期 ${has7Dates ? '<span class="pass">✓</span>' : '<span class="fail">✗</span>'}`);
      if (has7Dates) passCount++; else failCount++;

      // Test formatDisplay
      const displayDate = DateUtils.formatDisplay('2026-03-23');
      const hasCorrectFormat = displayDate.includes('3/23') && (displayDate.includes('周一') || displayDate.includes('周二') || displayDate.includes('周三') || displayDate.includes('周四') || displayDate.includes('周五') || displayDate.includes('周六') || displayDate.includes('周日'));
      results.push(`formatDisplay: ${displayDate} ${hasCorrectFormat ? '<span class="pass">✓</span>' : '<span class="fail">✗</span>'}`);
      if (hasCorrectFormat) passCount++; else failCount++;

      document.getElementById('dateResults').innerHTML =
        `<strong>结果: ${passCount} 通过, ${failCount} 失败</strong><br>` + results.join('<br>');
    }

    function testTimeUtils() {
      const results = [];
      let passCount = 0;
      let failCount = 0;

      // Test calculateTimeSpent
      const time1 = TimeUtils.calculateTimeSpent('18:00', '18:45');
      results.push(`calculateTimeSpent('18:00', '18:45'): ${time1}分钟 (期望: 45) ${time1 === 45 ? '<span class="pass">✓</span>' : '<span class="fail">✗</span>'}`);
      if (time1 === 45) passCount++; else failCount++;

      const time2 = TimeUtils.calculateTimeSpent('23:00', '01:00');
      results.push(`calculateTimeSpent('23:00', '01:00'): ${time2}分钟 (期望: 120, 跨午夜) ${time2 === 120 ? '<span class="pass">✓</span>' : '<span class="fail">✗</span>'}`);
      if (time2 === 120) passCount++; else failCount++;

      // Test formatMinutes
      const fmt1 = TimeUtils.formatMinutes(45);
      results.push(`formatMinutes(45): "${fmt1}" ${fmt1 === '45分钟' ? '<span class="pass">✓</span>' : '<span class="fail">✗</span>'}`);
      if (fmt1 === '45分钟') passCount++; else failCount++;

      const fmt2 = TimeUtils.formatMinutes(90);
      results.push(`formatMinutes(90): "${fmt2}" ${fmt2 === '1小时30分钟' ? '<span class="pass">✓</span>' : '<span class="fail">✗</span>'}`);
      if (fmt2 === '1小时30分钟') passCount++; else failCount++;

      const fmt3 = TimeUtils.formatMinutes(120);
      results.push(`formatMinutes(120): "${fmt3}" ${fmt3 === '2小时' ? '<span class="pass">✓</span>' : '<span class="fail">✗</span>'}`);
      if (fmt3 === '2小时') passCount++; else failCount++;

      // Test validateTime
      const valid1 = TimeUtils.validateTime('18:45');
      results.push(`validateTime('18:45'): ${valid1} ${valid1 ? '<span class="pass">✓</span>' : '<span class="fail">✗</span>'}`);
      if (valid1) passCount++; else failCount++;

      const valid2 = TimeUtils.validateTime('25:00');
      results.push(`validateTime('25:00'): ${valid2} ${!valid2 ? '<span class="pass">✓</span>' : '<span class="fail">✗</span>'}`);
      if (!valid2) passCount++; else failCount++;

      document.getElementById('timeResults').innerHTML =
        `<strong>结果: ${passCount} 通过, ${failCount} 失败</strong><br>` + results.join('<br>');
    }

    function testSubjectConfig() {
      const results = [];
      let passCount = 0;
      let failCount = 0;

      // Test colors
      const mathColor = SubjectConfig.getColor('数学');
      results.push(`getColor('数学'): ${mathColor} ${mathColor === '#e67e00' ? '<span class="pass">✓</span>' : '<span class="fail">✗</span>'}`);
      if (mathColor === '#e67e00') passCount++; else failCount++;

      const unknownColor = SubjectConfig.getColor('未知');
      results.push(`getColor('未知'): ${unknownColor} ${unknownColor === '#666' ? '<span class="pass">✓</span>' : '<span class="fail">✗</span>'}`);
      if (unknownColor === '#666') passCount++; else failCount++;

      // Test icons
      const mathIcon = SubjectConfig.getIcon('数学');
      results.push(`getIcon('数学'): ${mathIcon} ${mathIcon === '📐' ? '<span class="pass">✓</span>' : '<span class="fail">✗</span>'}`);
      if (mathIcon === '📐') passCount++; else failCount++;

      const unknownIcon = SubjectConfig.getIcon('未知');
      results.push(`getIcon('未知'): ${unknownIcon} ${unknownIcon === '📚' ? '<span class="pass">✓</span>' : '<span class="fail">✗</span>'}`);
      if (unknownIcon === '📚') passCount++; else failCount++;

      // Test all subjects
      const subjects = ['数学', '物理', '化学', '生物', '语文', '英语', '运动'];
      const allHaveIcons = subjects.every(s => SubjectConfig.getIcon(s));
      results.push(`所有科目都有图标: ${allHaveIcons ? '<span class="pass">✓</span>' : '<span class="fail">✗</span>'}`);
      if (allHaveIcons) passCount++; else failCount++;

      const allHaveColors = subjects.every(s => SubjectConfig.getColor(s) !== '#666');
      results.push(`所有科目都有颜色: ${allHaveColors ? '<span class="pass">✓</span>' : '<span class="fail">✗</span>'}`);
      if (allHaveColors) passCount++; else failCount++;

      document.getElementById('subjectResults').innerHTML =
        `<strong>结果: ${passCount} 通过, ${failCount} 失败</strong><br>` + results.join('<br>');
    }

    // Run tests on load
    window.onload = function() {
      console.log('Test page loaded. Click buttons to run tests.');
    };
  </script>
</body>
</html>
